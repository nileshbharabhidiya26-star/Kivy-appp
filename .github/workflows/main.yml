name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            pkg-config \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install "cython<3.0"
          pip install buildozer==1.5.0

      - name: Clean old builds
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
