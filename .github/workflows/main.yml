name: Build

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v5

      # Setup Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Build project
      - name: Build Project
        run: npm run build --if-present

      # Run tests (optional)
      - name: Run Tests
        run: npm test --if-present
